name: Alertes QHSE automatiques

on:
  schedule:
    - cron: '0 3 * * 1-5'
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  envoyer-alertes:
    name: Envoyer le rapport d'echeances
    runs-on: ubuntu-latest

    steps:
      - name: Appeler la Edge Function Supabase
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/alertes-calendrier")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Reponse HTTP : $HTTP_CODE"
          echo "Corps : $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Erreur : la Edge Function a retourne $HTTP_CODE"
            exit 1
          fi

          echo "Alertes envoyees avec succes"